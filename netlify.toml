[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/webhook-infinitepay"
  to = "/.netlify/functions/webhook-infinitepay"
  status = 200

[[redirects]]
  from = "https://encontrodeusas.arianaborges.com/"
  to = "/encontrodeusas.html"
  status = 200
  force = true

[[redirects]]
  from = "https://clubelivromulhermaravilha.arianaborges.com/"
  to = "/clubelivromulhermaravilha.html"
  status = 200
  force = true

[[redirects]]
  from = "https://dedomagnetico.arianaborges.com/"
  to = "/dedomagnetico.html"
  status = 200
  force = true

# Rewrites por path — servem o shell HTML correto (meta tags OG estaticas)
# para crawlers sociais, que nao executam JavaScript.
[[redirects]]
  from = "/dedo-magnetico"
  to = "/dedomagnetico.html"
  status = 200

[[redirects]]
  from = "/dedomagnetico"
  to = "/dedomagnetico.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
